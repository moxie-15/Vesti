<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Vesti</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .signup-container {
            display: flex;
            width: 900px;
            height: 550px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            overflow: hidden;
            position: relative;
        }

        /* --- Left Info Panel --- */
        .info-panel {
            flex: 1;
            background: #FAFAFA; /* very light grey to contrast with the right white panel */
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-right: 1px solid #EAEAEA;
        }

        .illustration {
            width: 180px;
            height: 180px;
            background-color: #13110f; /* Vesti Green suitcase placeholder */
            border-radius: 15px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 165, 68, 0.2);
        }
        /* Adding handle and wheels to fake a suitcase with pure CSS for the prototype */
        .illustration::before {
            content: '';
            position: absolute;
            top: -15px;
            width: 60px;
            height: 15px;
            border: 4px solid #333;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .illustration::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 120px;
            height: 10px;
            background: #333;
            border-radius: 5px;
        }

        .info-panel h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #111;
            margin: 0 0 15px;
        }

        .info-panel p {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            max-width: 280px;
            margin: 0 0 40px;
        }

        .carousel-indicators {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 25px;
            height: 4px;
            background: #E0E0E0;
            border-radius: 4px;
        }
        .dot.active {
            background: #13110f;
            width: 40px;
        }

        /* --- Right Action Panel --- */
        .action-panel {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 40px;
            text-decoration: none;
        }
        .logo svg {
            width: 40px;
            height: auto;
        }
        .logo span {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: #13110f;
            letter-spacing: -0.5px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #13110f; /* Vesti Green */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 30px;
        }
        .btn-primary:hover {
            background-color: #527c32;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            width: 100%;
            margin-bottom: 30px;
            color: #999;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #EAEAEA;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        .btn-social {
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #333;
            border: 1px solid #EAEAEA;
            border-radius: 30px; /* Pill shaped like the screenshot */
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: background 0.2s;
        }
        .btn-social:hover {
            background-color: #F9F9F9;
        }

        .terms {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
            text-align: center;
            line-height: 1.5;
            max-width: 300px;
        }
        .terms a {
            color: #111;
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="./assets/css/global.css">
<style>
    body, h1, h2, h3, h4, h5, h6, p, a, span { 
        -webkit-font-smoothing: antialiased; 
        -moz-osx-font-smoothing: grayscale; 
        text-rendering: optimizeLegibility; 
    }
</style>
</head>
<body>

    <div class="signup-container">
        <!-- Left Panel -->
        <div class="info-panel">
            <div class="illustration">
                <i data-lucide="plane" style="width: 48px; height: 48px;"></i>
                <!-- Abstract document icon overlapping -->
                <div style="position:absolute; bottom: -20px; right: -20px; width: 60px; height: 60px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:center; color: #ff9800;">
                    <i data-lucide="calendar" style="width: 28px; height: 28px;"></i>

            <div class="carousel-indicators">
                <div class="dot active"></div>

        </div>

        <!-- Right Panel -->
        <div class="action-panel">

                    <path d="M5.1 21.31C5.1 21.19 5.2 21.06 5.2 20.94C6.5 17.95 7.8 14.99 9.1 12C9.4 11.29 9.7 10.6 10.1 9.89C10.2 9.62 10.4 9.4 10.7 9.28C13.7 7.99 16.8 6.72 19.8 5.45C20 5.38 20.2 5.23 20.3 5.36C20.5 5.53 20.3 5.7 20.2 5.87C17.9 10.99 15.6 16.11 13.4 21.24C12.1 24.22 10.8 27.22 9.6 30.21C9.5 30.36 9.5 30.6 9.3 30.62C9.1 30.64 9 30.38 8.9 30.22C7.7 27.27 6.4 24.32 5.2 21.38C5.1 21.36 5.1 21.34 5.1 21.31Z" fill="#13110f" />
                </svg>
                <span>esti</span>
            </a>

            <button class="btn-primary">Continue with Email</button>

            <div class="divider">Or</div>

            <button class="btn-social">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

            <p class="terms">By clicking "Continue," you agree to our <br><a href="#">Privacy Policy</a> and <a href="#">Terms & Conditions</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
<script src="../../assets/js/script.js"></script>
</body>
</html>
